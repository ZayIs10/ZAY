<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root"
      data-start="0"
      data-duration="30"
      data-width="1080"
      data-height="1920"
    >
      <!-- BEAT 1 — HOOK (0–4s) -->
      <div id="b1" class="clip beat" data-start="0" data-duration="4" data-track-index="0">
        <div class="bg-image full">
          <img src="../assets/images/generated/post_20260406_132311.jpg" alt="" />
          <div class="vignette dark"></div>
        </div>
        <div class="beat-stack">
          <div class="line-setup" id="b1a">AI MADE THIS 19-YEAR-OLD</div>
          <div class="line-punch neon" id="b1b">$10,000</div>
          <div class="line-sub" id="b1c">IN 30 DAYS</div>
        </div>
      </div>

      <!-- BEAT 2 — PROBLEM (4–11s) -->
      <div id="b2" class="clip beat" data-start="4" data-duration="7" data-track-index="0">
        <div class="bg-image full">
          <img src="../assets/images/generated/post_20260406_131958.jpg" alt="" />
          <div class="vignette dark"></div>
        </div>
        <div class="beat-stack">
          <div class="line-setup" id="b2a">HALF OF GEN Z</div>
          <div class="line-punch neon" id="b2b">FEARS AI</div>
          <div class="line-setup small" id="b2c">THE OTHER HALF EARNS WITH IT</div>
        </div>
      </div>

      <!-- BEAT 3 — INSIGHT (11–21s) -->
      <div id="b3" class="clip beat" data-start="11" data-duration="10" data-track-index="0">
        <div class="bg-image full">
          <img src="../assets/images/generated/post_20260408_120136.jpg" alt="" />
          <div class="vignette dark"></div>
        </div>
        <div class="insight-block">
          <div class="insight-head" id="b3h">THE ENTIRE STACK</div>
          <div class="insight-row" id="b3r1"><span class="num neon">1.</span><span class="tool">CHATGPT</span></div>
          <div class="insight-row" id="b3r2"><span class="num neon">2.</span><span class="tool">ELEVENLABS</span></div>
          <div class="insight-row" id="b3r3"><span class="num neon">3.</span><span class="tool">ONE VIDEO TOOL</span></div>
        </div>
      </div>

      <!-- BEAT 4 — PROOF (21–27.5s) -->
      <div id="b4" class="clip beat" data-start="21" data-duration="6.5" data-track-index="0">
        <div class="bg-image full">
          <img src="../assets/images/generated/post_20260410_123912.jpg" alt="" />
          <div class="vignette dark"></div>
        </div>
        <div class="proof-final">
          <div class="proof-big neon" id="b4n">1 IN 3</div>
          <div class="proof-lbl" id="b4l">GEN Z–OWNED ONLINE BUSINESSES</div>
          <div class="proof-sub" id="b4s">FASTEST HIT $10K IN MONTH ONE</div>
        </div>
      </div>

      <!-- BEAT 5 — CTA (27.5–30s) -->
      <div id="b5" class="clip beat" data-start="27.5" data-duration="2.5" data-track-index="0">
        <div class="black-bg"></div>
        <div class="cta-final">
          <div class="cta-top" id="b5a">SEND THIS</div>
          <div class="cta-mid neon" id="b5b">TO ANYONE STILL AFRAID OF AI</div>
          <div class="cta-foot" id="b5c">FOLLOW @genzcapital</div>
        </div>
      </div>

      <!-- Persistent corner logo on top of all beats -->
      <div class="clip logo-corner-persistent" data-start="0" data-duration="30" data-track-index="1">
        <span class="corner-divider"></span>
        <span class="corner-text">GENZ CAPITAL</span>
      </div>

      <audio id="vo" data-start="0" data-duration="30" data-track-index="2" data-volume="1.0" src="assets/audio/genz-ai-stack_voiceover.mp3"></audio>
    </div>

    <script src="script.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      if (!window.__timelines['main']) {
        window.__timelines['main'] = (window.gsap || { timeline: () => ({}) }).timeline({ paused: true });
      }
    </script>
  </body>
</html>
