name: Build Carousel (Method A images)

# CAROUSEL sibling of build_tweet_card_reel.yml. Runs the @evolving.ai
# "reference-first" image pipeline in the cloud (never the user's laptop):
#   spec -> per slide: find real reference (media_finder) -> GPT-4o vision
#   writes house-style prompt -> OpenAI image -> render deck -> (optional) Drive.
#
# Fired by n8n via repository_dispatch once a carousel row is "Ready to Run",
# or manually from the Actions UI. The spec to build is passed as the client
# payload `spec` (a repo-relative path) or the workflow_dispatch input.
#
# n8n call shape:
#   POST https://api.github.com/repos/<owner>/<repo>/dispatches
#   { "event_type": "build-carousel",
#     "client_payload": { "spec": "assets/carousels/foo_spec.json" } }

on:
  repository_dispatch:
    types: [build-carousel]
  workflow_dispatch:
    inputs:
      spec:
        description: "Repo-relative path to an EXISTING spec JSON. Leave blank
          to auto-draft the next 'Ready to Run' Sheet row instead."
        required: false
        default: ""
      from_sheet:
        description: "Ignore 'spec' and draft the next 'Ready to Run' carousel
          row into a spec first (Sheet -> draft -> build)."
        type: boolean
        default: false
      to_drive:
        description: "Upload finished slides to Google Drive"
        type: boolean
        default: true
      dry_run:
        description: "VERIFY ONLY ($0): draft a FREE skeleton + find references
          + plan the render, but generate NO images. Proves the whole chain
          end-to-end without spending. Set client_payload.dry_run='true' from
          n8n to do the same."
        type: boolean
        default: false

jobs:
  build-carousel:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GOOGLE_SHEET_ID:      ${{ secrets.GOOGLE_SHEET_ID }}
      # Carousel topics are split into TWO format-specific tabs (2026-07-01):
      # "Carousel Tutorial" (how-to decks) and "Carousel Wild" (AI-in-the-Wild
      # news/use-case decks). The tab a topic sits in decides its build format,
      # so no per-row Format column is needed. These override the code defaults;
      # rename here if you rename the tabs.
      GOOGLE_SHEET_CAROUSEL_TUTORIAL_TAB: Carousel Tutorial
      GOOGLE_SHEET_CAROUSEL_WILD_TAB:     Carousel Wild
      PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
      OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
      OPENAI_IMAGE_MODEL:   gpt-image-1
      OPENAI_VISION_MODEL:  gpt-4o
      # Review gate: Gmail SMTP for the review email (same secrets as reels)
      GMAIL_ADDRESS:        ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
      NOTIFY_TO:            ${{ secrets.NOTIFY_TO }}
      # spec + to_drive resolved from whichever trigger fired
      SPEC: ${{ github.event.inputs.spec || github.event.client_payload.spec }}
      FROM_SHEET: ${{ github.event.inputs.from_sheet || github.event.client_payload.from_sheet }}
      TO_DRIVE: ${{ github.event.inputs.to_drive || github.event.client_payload.to_drive }}
      DRY_RUN: ${{ github.event.inputs.dry_run || github.event.client_payload.dry_run }}
      OPENAI_SPEC_MODEL:    gpt-4o-mini
      OPENAI_RUN_BUDGET_USD:     ${{ secrets.OPENAI_RUN_BUDGET_USD }}
      OPENAI_DAILY_BUDGET_USD:   ${{ secrets.OPENAI_DAILY_BUDGET_USD }}
      OPENAI_MONTHLY_BUDGET_USD: ${{ secrets.OPENAI_MONTHLY_BUDGET_USD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env
        run: |
          printf "GOOGLE_SHEET_ID=%s\n" "$GOOGLE_SHEET_ID" >> .env
          printf "GOOGLE_SHEET_CAROUSEL_TUTORIAL_TAB=%s\n" "$GOOGLE_SHEET_CAROUSEL_TUTORIAL_TAB" >> .env
          printf "GOOGLE_SHEET_CAROUSEL_WILD_TAB=%s\n" "$GOOGLE_SHEET_CAROUSEL_WILD_TAB" >> .env
          printf "PEXELS_API_KEY=%s\n"  "$PEXELS_API_KEY"  >> .env
          printf "OPENAI_API_KEY=%s\n"  "$OPENAI_API_KEY"  >> .env
          printf "OPENAI_IMAGE_MODEL=%s\n"  "$OPENAI_IMAGE_MODEL"  >> .env
          printf "OPENAI_VISION_MODEL=%s\n" "$OPENAI_VISION_MODEL" >> .env
          printf "OPENAI_SPEC_MODEL=%s\n"   "$OPENAI_SPEC_MODEL"   >> .env
          [ -n "$OPENAI_RUN_BUDGET_USD" ]     && printf "OPENAI_RUN_BUDGET_USD=%s\n"     "$OPENAI_RUN_BUDGET_USD"     >> .env
          [ -n "$OPENAI_DAILY_BUDGET_USD" ]   && printf "OPENAI_DAILY_BUDGET_USD=%s\n"   "$OPENAI_DAILY_BUDGET_USD"   >> .env
          [ -n "$OPENAI_MONTHLY_BUDGET_USD" ] && printf "OPENAI_MONTHLY_BUDGET_USD=%s\n" "$OPENAI_MONTHLY_BUDGET_USD" >> .env
          true

      - name: Write Google service account
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > google_service_account.json

      - name: Write Google Drive token (for Drive upload)
        # Same secret the reels workflow uses — a pre-authorized OAuth token,
        # because CI has no browser to do an interactive sign-in.
        if: ${{ env.TO_DRIVE == 'true' }}
        run: |
          if [ -n '${{ secrets.GOOGLE_DRIVE_TOKEN_JSON }}' ]; then
            echo '${{ secrets.GOOGLE_DRIVE_TOKEN_JSON }}' > google_drive_token.json
          fi

      - name: Auto-draft spec from the Sheet (if no spec given)
        id: draft
        # Runs only when from_sheet=true OR no spec path was provided. This is
        # the missing link: 'Ready to Run' row -> draft_spec (cheap GPT text,
        # usage-guarded) -> assets/carousels/<slug>_spec.json. The build step
        # then picks up DRAFTED_SPEC. If a spec path WAS given, we skip this.
        if: ${{ env.FROM_SHEET == 'true' || env.SPEC == '' }}
        run: |
          set -o pipefail
          mkdir -p logs
          # DRY_RUN: draft a FREE skeleton (no GPT spend) instead of a paid draft.
          DRAFT_DRY=""
          if [ "$DRY_RUN" = "true" ]; then DRAFT_DRY="--dry-run"; fi
          # The drafter prints spec_path/topic to $GITHUB_OUTPUT on success. If
          # it CRASHES (GPT/budget/Sheet error) set -o pipefail makes this step
          # fail red — that's correct, a real error should be loud. An EMPTY
          # queue is NOT a crash: the drafter exits 0 and just emits no
          # spec_path, which the build step treats as a clean skip (below).
          python publisher/carousel_templates.py from-sheet $DRAFT_DRY \
            --github-output 2>&1 | tee logs/carousel_draft.log
          if [ -z "${{ steps.draft.outputs.spec_path }}" ]; then
            echo "No 'Ready to Run' carousel row right now — nothing to draft."
          fi

      - name: Build carousel
        id: build
        run: |
          set -o pipefail
          mkdir -p logs
          # Prefer the spec drafted from the Sheet; else the spec path given.
          DRAFTED="${{ steps.draft.outputs.spec_path }}"
          if [ -n "$DRAFTED" ]; then SPEC="$DRAFTED"; fi
          if [ -z "$SPEC" ]; then
            # Two very different reasons SPEC can be empty — and they must NOT be
            # treated the same:
            #   (a) Nobody gave a spec path AND the auto-draft found no
            #       'Ready to Run' carousel row. The queue is simply empty.
            #       This is NORMAL (n8n may fire on a row that's actually a reel,
            #       or the carousel queue is empty) — exit GREEN so it doesn't
            #       spam a failure alert. (The bug the user kept hitting.)
            #   (b) A spec path WAS explicitly provided but is now missing — a
            #       real error worth failing on. We can't reach here in case (b)
            #       because $SPEC would be non-empty; if a given path doesn't
            #       exist, the pipeline below raises and fails red on its own.
            echo "::notice::No carousel queued (no 'Ready to Run' carousel row, no spec path). Nothing to build — exiting cleanly."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # A spec path was resolved but the file isn't there -> real error.
          if [ ! -f "$SPEC" ]; then
            echo "::error::Spec path '$SPEC' was given but the file does not exist."
            exit 1
          fi

          if [ "$DRY_RUN" = "true" ]; then
            # VERIFY ONLY ($0): walk every slide, find real references, print the
            # render plan — but generate NO images, no Drive, no Sheet write.
            echo "DRY RUN — verifying the chain for \$0 on spec: $SPEC"
            python publisher/carousel_image_pipeline.py --spec "$SPEC" \
              --dry-run 2>&1 | tee logs/carousel_build.log
            # The draft step claimed the row to 'Drafting'; release it back to
            # 'Ready to Run' so a dry verification leaves the Sheet untouched.
            TOPIC="${{ steps.draft.outputs.topic }}"
            if [ -n "$TOPIC" ]; then
              python -c "import sys; from publisher.carousel_review import update_sheet_status; update_sheet_status(sys.argv[1], 'Ready to Run'); print('Dry run: row reset to Ready to Run.')" "$TOPIC" \
                || echo "(could not reset row status — not fatal)"
            fi
            echo "DRY RUN complete — no images generated, no spend."
            exit 0
          fi

          DRIVE_FLAG=""
          if [ "$TO_DRIVE" = "true" ] && [ -f google_drive_token.json ]; then
            DRIVE_FLAG="--to-drive"
          fi
          echo "Building spec: $SPEC  (drive=$DRIVE_FLAG)"
          # --update-sheet: Status -> "Ready to Post" (+ Drive URL) on success,
          # "Render Failed" on error, so the n8n "Building" claim is released.
          python publisher/carousel_image_pipeline.py --spec "$SPEC" \
            $DRIVE_FLAG --update-sheet 2>&1 \
            | tee logs/carousel_build.log

      - name: Upload rendered slides + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: carousel-${{ github.run_id }}
          path: |
            assets/carousels/**/slide_*.png
            assets/carousels/**/carousel.json
            logs/
          retention-days: 14
