name: Run Gen Z Publisher

on:
  repository_dispatch:
    types: [run-publisher]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env file
        run: |
          cat <<EOF > .env
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          IMGBB_API_KEY=${{ secrets.IMGBB_API_KEY }}
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
          INSTAGRAM_IG_USER_ID=${{ secrets.INSTAGRAM_IG_USER_ID }}
          EOF

      - name: Write Google service account
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > google_service_account.json

      - name: Run publisher
        run: python publisher/post_generator.py
