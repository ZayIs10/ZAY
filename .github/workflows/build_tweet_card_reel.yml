name: Build Tweet-Card Reel

# Fired by Workflow B (n8n) after it has written Media Video URL +
# Media Image URL to a Reels-tab row that the user flipped to
# Status="Ready".
#
# n8n call shape:
#   POST https://api.github.com/repos/<owner>/<repo>/dispatches
#   {
#     "event_type": "build-tweet-card-reel",
#     "client_payload": { "row_index": "17" }
#   }
#
# Also runnable manually from the GitHub Actions UI (specify row_index).
#
# RUNS IN GITHUB'S CLOUD (ubuntu-latest) — the user's PC can stay OFF.
# Why this works now: YouTube permanently bot-blocks datacenter IPs (GitHub
# Actions) with "Sign in to confirm you're not a bot". We get past it by routing
# the yt-dlp download through a DataImpulse RESIDENTIAL proxy (secret PROXY_URL),
# which gives the request a residential IP YouTube trusts. Pay-as-you-go (~$1/GB);
# the build only downloads the used section of each clip (~a few MB, ~1c/run).
#
# Fallback: if PROXY_URL is ever unset, the download falls back to the cookieless
# clients (which fail from a datacenter IP) — so keep the secret set. The old
# self-hosted-PC runner remains a valid alternative if you ever drop the proxy
# (set runs-on back to [self-hosted, windows, genz-pc] and use the pwsh steps in
# git history).

on:
  repository_dispatch:
    types: [build-tweet-card-reel]
  workflow_dispatch:
    inputs:
      topic:
        description: "Exact Topic string to render (preferred; robust to row reordering)"
        required: false
        type: string
      row_index:
        description: "1-indexed Reels-tab row to render (fallback if topic is blank)"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SHEET_REELS_NAME: Reels
      YOUTUBE_COOKIES_FILE: youtube_cookies.txt
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      # Residential proxy — the load-bearing secret that lets the cloud download
      # YouTube clips (datacenter IPs are bot-blocked). Built from the
      # DataImpulse login:password@host:port. See media_consumer._ytdlp_base_opts.
      PROXY_URL: ${{ secrets.PROXY_URL }}
      # Instagram staging (upload + process the reel; the user taps Publish).
      # If unset the build still succeeds — it skips IG staging and the review
      # email tells the user to post from the Drive link instead.
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
      # Review-email notifier (Gmail SMTP, app password). If these secrets are
      # unset the build still succeeds — it just skips the email.
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      NOTIFY_TO: ${{ secrets.NOTIFY_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg + Deno
        # ffmpeg: full build from apt supports -crf (the stripped builds don't).
        # Deno: yt-dlp's JS runtime for the YouTube "n challenge" solver.
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yt-dlp

      - name: Verify tools
        run: |
          python --version
          ffmpeg -version | head -1
          deno --version | head -1 || echo "::warning::deno not found (yt-dlp JS solver may degrade)"

      - name: Write .env
        run: |
          {
            printf "GOOGLE_SHEET_ID=%s\n" "$GOOGLE_SHEET_ID"
            printf "GOOGLE_SHEET_REELS_NAME=%s\n" "$GOOGLE_SHEET_REELS_NAME"
            printf "YOUTUBE_API_KEY=%s\n" "$YOUTUBE_API_KEY"
            [ -n "$PROXY_URL" ] && printf "PROXY_URL=%s\n" "$PROXY_URL"
            true
          } > .env

      - name: Write Google service account
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > google_service_account.json

      - name: Write Drive OAuth token
        # Pre-authorized token JSON (run publish_reel.py locally once to mint it,
        # then copy the contents of google_drive_token.json into this secret).
        run: |
          if [ -n '${{ secrets.GOOGLE_DRIVE_TOKEN_JSON }}' ]; then
            echo '${{ secrets.GOOGLE_DRIVE_TOKEN_JSON }}' > google_drive_token.json
          fi

      - name: Write YouTube cookies (OPTIONAL — proxy + cookieless is the default)
        # Downloads use cookieless YouTube player clients through the residential
        # proxy, so login cookies are NOT required. If the secret IS present we
        # still write it as a bonus for rare age-gated clips; empty is normal.
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -z "$YOUTUBE_COOKIES" ]; then
            echo "::notice::No YOUTUBE_COOKIES secret — using cookieless clients through the proxy (the normal path)."
          else
            printf '%s' "$YOUTUBE_COOKIES" > youtube_cookies.txt
            echo "Wrote youtube_cookies.txt ($(wc -l < youtube_cookies.txt) lines) — used as a bonus backup."
          fi

      - name: Resolve target (topic preferred, row_index fallback)
        id: target
        env:
          # Topic is the robust selector: it can't drift if the sheet is
          # re-sorted between n8n firing and this build running. row_index
          # is kept only as a fallback for old callers / manual runs.
          TOPIC: ${{ github.event.client_payload.topic || github.event.inputs.topic }}
          ROW_INDEX: ${{ github.event.client_payload.row_index || github.event.inputs.row_index }}
        run: |
          if [ -n "$TOPIC" ]; then
            echo "mode=topic" >> "$GITHUB_OUTPUT"
            echo "topic=$TOPIC" >> "$GITHUB_OUTPUT"
            echo "Building reel for Topic: $TOPIC"
          elif [ -n "$ROW_INDEX" ]; then
            echo "mode=row" >> "$GITHUB_OUTPUT"
            echo "row=$ROW_INDEX" >> "$GITHUB_OUTPUT"
            echo "Building reel for Reels row $ROW_INDEX (no topic given)"
          else
            echo "::error::Neither topic nor row_index provided"
            exit 1
          fi

      - name: Build reel
        env:
          TOPIC: ${{ steps.target.outputs.topic }}
          ROW: ${{ steps.target.outputs.row }}
          MODE: ${{ steps.target.outputs.mode }}
        run: |
          set -o pipefail
          mkdir -p logs renders
          if [ "$MODE" = "topic" ]; then
            python publisher/tweet_card_reel.py --topic "$TOPIC" 2>&1 | tee "logs/tweet_card_reel.log"
          else
            python publisher/tweet_card_reel.py --row "$ROW" 2>&1 | tee "logs/tweet_card_reel_row${ROW}.log"
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tweet-card-reel-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      - name: Upload reel mp4 (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tweet-card-reel-mp4-${{ github.run_id }}
          path: renders/*-tweet.mp4
          retention-days: 7
          if-no-files-found: ignore
