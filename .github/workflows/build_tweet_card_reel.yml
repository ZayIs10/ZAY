name: Build Tweet-Card Reel

# Fired by Workflow B (n8n) after it has written Media Video URL +
# Media Image URL to a Reels-tab row that the user flipped to
# Status="Ready".
#
# n8n call shape:
#   POST https://api.github.com/repos/<owner>/<repo>/dispatches
#   {
#     "event_type": "build-tweet-card-reel",
#     "client_payload": { "row_index": "17" }
#   }
#
# Also runnable manually from the GitHub Actions UI (specify row_index).
#
# RUNS ON A SELF-HOSTED RUNNER (the user's own PC), NOT GitHub's servers.
# Why: YouTube permanently bot-blocks datacenter IPs (GitHub Actions) with
# "Sign in to confirm you're not a bot" — no login fixes it, it's the IP.
# Running the download from the user's home internet is the only reliable,
# free, automatic fix. If the PC is OFF, the job simply QUEUES and runs the
# moment the PC comes back online (it never fails red for being offline).
# The runner auto-starts at logon (scheduled task "GitHubActionsRunner-GenZ").
#
# Tools are pre-installed on the PC (Python 3.13, ffmpeg via winget, Deno,
# yt-dlp, node). The steps below VERIFY them rather than install them.

on:
  repository_dispatch:
    types: [build-tweet-card-reel]
  workflow_dispatch:
    inputs:
      topic:
        description: "Exact Topic string to render (preferred; robust to row reordering)"
        required: false
        type: string
      row_index:
        description: "1-indexed Reels-tab row to render (fallback if topic is blank)"
        required: false
        type: string

jobs:
  build:
    # Self-hosted runner on the user's PC. All three labels must match the
    # runner registered as "marc-pc" (self-hosted, windows, genz-pc).
    runs-on: [self-hosted, windows, genz-pc]
    timeout-minutes: 45

    # Every run step is PowerShell — the runner is Windows, not Linux.
    defaults:
      run:
        shell: pwsh

    env:
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SHEET_REELS_NAME: Reels
      YOUTUBE_COOKIES_FILE: youtube_cookies.txt
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      # Instagram staging (upload + process the reel; the user taps Publish).
      # If unset the build still succeeds — it skips IG staging and the review
      # email tells the user to post from the Drive link instead.
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
      # Review-email notifier (Gmail SMTP, app password). If these secrets are
      # unset the build still succeeds — it just skips the email.
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      NOTIFY_TO: ${{ secrets.NOTIFY_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify build tools are present (ffmpeg, Deno, node)
        # On the self-hosted PC these are installed once (ffmpeg via winget,
        # Deno + node already present). We VERIFY rather than install. ffmpeg
        # is the one that can be missing from PATH right after a winget install
        # until the shell restarts — the runner service picks up the user PATH
        # on its next start, so this should pass. If ffmpeg is genuinely
        # missing we surface a clear error instead of failing deep in the build.
        run: |
          $ok = $true
          foreach ($tool in 'ffmpeg','deno','node') {
            $cmd = Get-Command $tool -ErrorAction SilentlyContinue
            if ($cmd) {
              Write-Host "OK  $tool -> $($cmd.Source)"
            } else {
              Write-Host "::warning::$tool not found on PATH"
              if ($tool -eq 'ffmpeg') { $ok = $false }
            }
          }
          if (-not $ok) {
            Write-Host "::error::ffmpeg is required for muxing but was not found on PATH. Restart the runner so it picks up the updated PATH (winget added ffmpeg)."
            exit 1
          }

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yt-dlp

      - name: Write .env
        # OVERWRITE (not append): a self-hosted runner reuses the same working
        # directory across runs, and .env is gitignored so checkout won't wipe
        # it. Starting fresh each run avoids stale/duplicate keys piling up.
        run: |
          $lines = @(
            "GOOGLE_SHEET_ID=$env:GOOGLE_SHEET_ID"
            "GOOGLE_SHEET_REELS_NAME=$env:GOOGLE_SHEET_REELS_NAME"
            "YOUTUBE_API_KEY=$env:YOUTUBE_API_KEY"
          )
          Set-Content -Path .env -Value $lines -Encoding utf8

      - name: Write Google service account
        # Pass the secret through the ENV (not inline ${{ }}) so PowerShell
        # never reinterprets braces/quotes inside the JSON, and write it as
        # raw UTF-8 with no BOM so Python's json loader is happy.
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          [System.IO.File]::WriteAllText("$PWD/google_service_account.json", $env:GOOGLE_SERVICE_ACCOUNT_JSON)

      - name: Write Drive OAuth token
        # Pre-authorized token JSON (run publish_reel.py locally once to mint it,
        # then copy the contents of google_drive_token.json into this secret).
        env:
          GOOGLE_DRIVE_TOKEN_JSON: ${{ secrets.GOOGLE_DRIVE_TOKEN_JSON }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:GOOGLE_DRIVE_TOKEN_JSON)) {
            [System.IO.File]::WriteAllText("$PWD/google_drive_token.json", $env:GOOGLE_DRIVE_TOKEN_JSON)
          }

      - name: Write YouTube cookies (OPTIONAL — cookieless is the default)
        # Downloads use multiple cookieless YouTube player clients
        # (tv/ios/android/web_safari) and try each until one works, so login
        # cookies are NOT required. From this self-hosted PC's home IP the
        # cookieless path works reliably (YouTube trusts residential IPs). If
        # the secret IS present we still write it as a bonus for rare age-gated
        # clips; empty is totally normal — NOT a warning.
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:YOUTUBE_COOKIES)) {
            Write-Host "::notice::No YOUTUBE_COOKIES secret — using cookieless clients from the home IP (the normal, reliable path)."
          } else {
            $env:YOUTUBE_COOKIES | Out-File -FilePath youtube_cookies.txt -Encoding ascii
            $lines = (Get-Content youtube_cookies.txt | Measure-Object -Line).Lines
            Write-Host "Wrote youtube_cookies.txt ($lines lines) — used as a bonus backup."
          }

      - name: Resolve target (topic preferred, row_index fallback)
        id: target
        env:
          # Topic is the robust selector: it can't drift if the sheet is
          # re-sorted between n8n firing and this build running. row_index
          # is kept only as a fallback for old callers / manual runs.
          TOPIC: ${{ github.event.client_payload.topic || github.event.inputs.topic }}
          ROW_INDEX: ${{ github.event.client_payload.row_index || github.event.inputs.row_index }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:TOPIC)) {
            "mode=topic"        | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "topic=$env:TOPIC"  | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "Building reel for Topic: $env:TOPIC"
          } elseif (-not [string]::IsNullOrWhiteSpace($env:ROW_INDEX)) {
            "mode=row"          | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "row=$env:ROW_INDEX" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "Building reel for Reels row $env:ROW_INDEX (no topic given)"
          } else {
            Write-Host "::error::Neither topic nor row_index provided"
            exit 1
          }

      - name: Build reel
        env:
          TOPIC: ${{ steps.target.outputs.topic }}
          ROW: ${{ steps.target.outputs.row }}
          MODE: ${{ steps.target.outputs.mode }}
        run: |
          New-Item -ItemType Directory -Force -Path logs, renders | Out-Null
          $ErrorActionPreference = 'Continue'
          if ($env:MODE -eq 'topic') {
            python publisher/tweet_card_reel.py --topic "$env:TOPIC" 2>&1 | Tee-Object -FilePath "logs/tweet_card_reel.log"
          } else {
            python publisher/tweet_card_reel.py --row "$env:ROW" 2>&1 | Tee-Object -FilePath "logs/tweet_card_reel_row$($env:ROW).log"
          }
          # Propagate the Python exit code so a real build failure fails the step.
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::tweet_card_reel.py exited with code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tweet-card-reel-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      - name: Upload reel mp4 (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tweet-card-reel-mp4-${{ github.run_id }}
          path: renders/*-tweet.mp4
          retention-days: 7
          if-no-files-found: ignore
