name: Publish Due Reels (8pm SGT)

# REAL scheduling for Instagram reels.
#
# The IG Graph API can't truly schedule — sending scheduled_publish_time is
# silently ignored and the reel posts instantly (verified against a live post
# 2026-06-18). So GitHub does the scheduling: the reel build renders + uploads
# to Drive and leaves the row at Status="Ready to Post". This cron runs at the
# peak Singapore/Malaysia evening window and publishes ONE queued reel per day
# (the script's default cap) — so at most one reel goes live per day at 8pm SGT.
# If several are queued they drain one-per-day on the following days.
#
# Schedule: 12:00 UTC daily = 8:00 PM SGT/MYT (UTC+8), every day.
# (GitHub cron is always UTC and can lag a few minutes under load — that's fine
#  for a peak-time post.)
#
# Also runnable manually from the Actions UI (with an optional dry-run).

"on":
  # AUTO-PUBLISH DISABLED (2026-06-29, by user request).
  # The build still renders + uploads to Drive + emails the link, but nothing
  # posts to Instagram automatically anymore — the user reviews and posts
  # manually from the Drive link. The daily cron below is intentionally
  # commented out. Manual publishing is still available via the Actions "Run
  # workflow" button (workflow_dispatch) if it's ever wanted.
  # schedule:
  #   - cron: "0 12 * * *"        # 12:00 UTC = 20:00 SGT, every day
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = list due reels but publish nothing"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      limit:
        description: "Max reels to publish (blank = 1/one per day; 0 = all due)"
        required: false
        type: string

# Never let two publish runs race (e.g. a manual dry-run while the cron fires).
# A second run waits for the first instead of cancelling it — so a queued reel
# can't get stranded by an auto-cancelled overlap (the 2026-06-18 symptom).
concurrency:
  group: publish-due-reels
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SHEET_REELS_NAME: Reels
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
      # Failure-alert email (Gmail SMTP, app password). If unset, the alert step
      # just skips — it never fails the job.
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      NOTIFY_TO: ${{ secrets.NOTIFY_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify Instagram secrets are set
        run: |
          if [ -z "$INSTAGRAM_ACCESS_TOKEN" ] || [ -z "$INSTAGRAM_IG_USER_ID" ]; then
            echo "::error::INSTAGRAM_ACCESS_TOKEN / INSTAGRAM_IG_USER_ID secret is missing."
            exit 1
          fi

      - name: Write .env
        run: |
          printf "GOOGLE_SHEET_ID=%s\n" "$GOOGLE_SHEET_ID" >> .env
          printf "GOOGLE_SHEET_REELS_NAME=%s\n" "$GOOGLE_SHEET_REELS_NAME" >> .env

      - name: Write Google service account
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > google_service_account.json

      - name: Check Instagram token (read-only, posts nothing)
        # Validates the INSTAGRAM_ACCESS_TOKEN secret before we try to publish:
        # is it valid, when does it expire, can it see + publish to the account.
        # Doesn't fail the job (continue-on-error) — the publish step will still
        # try, and any real failure triggers the alert email. This just surfaces
        # an expiring/broken token clearly in the log.
        continue-on-error: true
        run: python publisher/check_ig_token.py

      - name: Publish due reels (one per day by default)
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          set -o pipefail
          mkdir -p logs
          ARGS=""
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          # On the daily cron no LIMIT is passed → the script's default of 1
          # applies = exactly one post per day. A manual run can override
          # (set the limit input to 0 for "all due", or to N for a custom cap).
          if [ -n "$LIMIT" ]; then ARGS="$ARGS --limit $LIMIT"; fi
          echo "Running: python publisher/publish_due_reels.py $ARGS"
          python publisher/publish_due_reels.py $ARGS 2>&1 \
            | tee "logs/publish_due_reels.log"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-due-reels-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      # If the JOB itself died (GitHub outage, dependency error, cancelled run)
      # the in-script failure alert never got a chance to run — so email from
      # here too. Skips silently if Gmail secrets are unset; never fails.
      - name: Email alert if the run failed
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          try:
              from publisher.notify_email import send
              url = os.getenv("RUN_URL", "")
              send(
                  "[GenZ ALERT] 8pm SGT publish run FAILED",
                  "The scheduled reel-publish run did not finish successfully.\n\n"
                  "Your queued reels (Status='Ready to Post') were NOT posted and\n"
                  "remain queued — they'll go out at the next 8pm SGT run.\n\n"
                  f"See what happened:\n{url}\n",
              )
              print("Failure-alert email sent.")
          except Exception as exc:
              print(f"Could not send failure-alert email: {exc}")
          PY
