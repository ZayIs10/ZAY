<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen Z Automation - Instagram Post Example</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Inter', sans-serif;
            padding: 40px;
        }
        .canvas {
            width: 1080px;
            height: 1080px;
            background-color: #000000;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            /* Scaling down slightly just for preview purposes if screen is small, but keeping internal 1080x1080 */
            flex-shrink: 0;
        }
        .image-container {
            width: 100%;
            height: 60%;
            background-color: #111;
            background-image: url('example_image.png');
            background-size: cover;
            background-position: center;
        }
        .text-container {
            width: 100%;
            height: 40%;
            padding: 55px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .headline {
            font-family: 'Anton', sans-serif;
            font-size: 82px;
            line-height: 1.05;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }
        .highlight {
            color: #39FF14;
        }
        .subheadline {
            font-size: 30px;
            color: #A0A0A0;
            line-height: 1.4;
            font-weight: 500;
            letter-spacing: -0.5px;
            max-width: 900px;
        }
        @media (max-width: 1200px) {
            .canvas {
                transform: scale(0.6);
                transform-origin: center center;
            }
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="image-container"></div>
        <div class="text-container">
            <div class="headline">
                HOW AI IS REPLACING<br>
                <span class="highlight">85 MILLION JOBS</span><br>
                IN THE NEXT 5 YEARS
            </div>
            <div class="subheadline">
                The transition has already started. Learn how to leverage automation before your skills become completely obsolete.
            </div>
        </div>
    </div>
</body>
</html>
